<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>race log</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:              #0f0f0f;
      --border:          #222;
      --text:            #d4d4d4;
      --muted:           #555;
      --mono:            'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
      --accent-5k:       #34d399;
      --accent-10k:      #60a5fa;
      --accent-half:     #f59e0b;
      --accent-marathon: #a78bfa;
      --pr:              #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }

    header { margin-bottom: 64px; }

    header h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }

    header p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    section { margin-bottom: 72px; }

    section h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 28px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 64px;
    }

    /* Chart */
    #chart-wrapper {
      position: relative;
      height: 300px;
    }

    /* PR cards */
    #pr-grid {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
    }

    .pr-card .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .pr-card .time {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 400;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .pr-card .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 16px 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover { color: var(--text); }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 13px 16px 13px 0;
      vertical-align: middle;
    }

    td.mono {
      font-family: var(--mono);
      font-size: 13px;
    }

    td a { color: var(--text); text-decoration: none; }
    td a:hover { color: #fff; }

    .pr-badge {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--pr);
      margin-left: 8px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <h1>race log</h1>
    <p id="subtitle">loading...</p>
  </header>

  <section id="chart-section">
    <h2>Progress</h2>
    <div id="chart-wrapper"><canvas id="chart"></canvas></div>
  </section>

  <hr>

  <section id="pr-section">
    <h2>Personal bests</h2>
    <div id="pr-grid"></div>
  </section>

  <hr>

  <section id="table-section">
    <h2>All races</h2>
    <div id="table-container"></div>
  </section>

  <script>
    let races = [];

    const CATEGORY_COLORS = {
      '5k':       'var(--accent-5k)',
      '10k':      'var(--accent-10k)',
      'half':     'var(--accent-half)',
      'marathon': 'var(--accent-marathon)',
    };

    const CATEGORY_LABELS = {
      '5k': '5k', '10k': '10k', 'half': 'Half Marathon', 'marathon': 'Marathon',
    };

    const CATEGORY_ORDER = ['5k', '10k', 'half', 'marathon'];

    function formatTime(totalSeconds) {
      const s = Math.round(totalSeconds);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    function renderChart() {
      const categories = [...new Set(races.map((r) => r.category))]
        .filter((c) => c !== 'other')
        .sort((a, b) => CATEGORY_ORDER.indexOf(a) - CATEGORY_ORDER.indexOf(b));

      const allDates = [...new Set(races.map((r) => r.date))].sort();

      const datasets = categories.map((cat) => {
        const catRaces = races.filter((r) => r.category === cat).sort((a, b) => a.date.localeCompare(b.date));
        return {
          label: CATEGORY_LABELS[cat] || cat,
          data: catRaces.map((r) => ({ x: r.date, y: r.durationSeconds, race: r })),
          borderColor: CATEGORY_COLORS[cat] || '#888',
          backgroundColor: CATEGORY_COLORS[cat] || '#888',
          tension: 0.3,
          pointRadius: 5,
          pointHoverRadius: 8,
        };
      });

      new Chart(document.getElementById('chart'), {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'point' },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#555', font: { size: 11 }, boxWidth: 10, padding: 20 },
            },
            tooltip: {
              backgroundColor: '#161616',
              borderColor: '#2a2a2a',
              borderWidth: 1,
              titleColor: '#d4d4d4',
              bodyColor: '#777',
              padding: 14,
              callbacks: {
                title: (items) => items[0].raw.race.name,
                label: (item) => {
                  const r = item.raw.race;
                  return [`  ${r.date}`, `  ${formatTime(r.durationSeconds)}  ·  ${r.pacePerKm}/km`];
                },
              },
            },
          },
          scales: {
            x: {
              type: 'category',
              labels: allDates,
              grid: { color: '#161616' },
              ticks: {
                color: '#444',
                font: { size: 11 },
                maxRotation: 0,
                callback: (_val, idx) => allDates[idx] ? allDates[idx].slice(0, 7) : '',
              },
            },
            y: {
              reverse: true,
              grid: { color: '#161616' },
              ticks: {
                color: '#444',
                font: { family: "'SF Mono','Fira Code',monospace", size: 11 },
                callback: (val) => formatTime(val),
              },
            },
          },
        },
      });
    }

    async function loadData() {
      try {
        const res = await fetch('races.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        races = await res.json();
      } catch (err) {
        document.getElementById('subtitle').textContent = 'could not load race data';
        console.error(err);
        return;
      }

      if (races.length === 0) {
        document.getElementById('subtitle').textContent = 'no races yet';
        return;
      }

      const years = races.map((r) => r.date.slice(0, 4));
      const first = years[0], last = years[years.length - 1];
      document.getElementById('subtitle').textContent = first === last ? first : `${first} – ${last}`;

      renderChart();
      // renderPRs()   — added in Task 7
      // renderTable() — added in Task 7
    }

    loadData();
  </script>
</body>
</html>
